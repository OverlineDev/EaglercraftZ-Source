<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EaglercraftZ</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #game {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <script>
    window.eaglercraftXOpts = {
      container: "game",
      assetsURI: "./assets.epk",
      localesURI: "./lang",
      crashOnUncaughtExceptions: true,
      deobfStackTraces: true,
      allowBootMenu: true,
      showBootMenuOnLaunch: false
    };
  </script>

  <script src="./javascript/classes.js"></script>
</body>
</html>
